<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Stash — Card Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500&family=Newsreader:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f4efe6;
    --ink: #1c1a17;
    --rule: #d8cfbf;
    --accent: #b5331f;
    --accent-deep: #7d2114;
    --gold: #9a7b35;
    --green: #2f6b4f;
    --card: #fbf8f1;
    --shadow: 0 1px 0 rgba(28,26,23,.06), 0 12px 28px -18px rgba(28,26,23,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(28,26,23,.035) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: "Newsreader", Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px 80px; }

  header.masthead {
    border-bottom: 3px double var(--ink);
    padding: 34px 0 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: clamp(38px, 6vw, 62px);
    letter-spacing: -.02em;
    line-height: .92;
  }
  .masthead h1 .sub {
    display: block;
    font-family: "Spline Sans Mono", monospace;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-top: 10px;
  }
  .masthead .dateline {
    font-family: "Spline Sans Mono", monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #7c7264;
    text-align: right;
  }

  nav.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--rule); margin-bottom: 28px; }
  nav.tabs button {
    appearance: none; background: none; border: none; cursor: pointer;
    font-family: "Spline Sans Mono", monospace; font-size: 13px;
    letter-spacing: .14em; text-transform: uppercase;
    padding: 14px 22px; color: #8a7f6f; position: relative; transition: color .2s;
  }
  nav.tabs button:hover { color: var(--ink); }
  nav.tabs button.active { color: var(--ink); }
  nav.tabs button.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 3px; background: var(--accent);
  }

  .panel { display: none; animation: fade .35s ease; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform:none; } }

  /* Search controls */
  .searchbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; margin-bottom: 8px; }
  .searchbar input[type=text] {
    flex: 1; min-width: 240px;
    font-family: "Newsreader", serif; font-size: 19px;
    padding: 14px 16px; background: var(--card);
    border: 1.5px solid var(--ink); border-radius: 2px; color: var(--ink);
  }
  .searchbar input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  select, .filters input {
    font-family: "Spline Sans Mono", monospace; font-size: 12px;
    padding: 10px 12px; background: var(--card);
    border: 1px solid var(--rule); border-radius: 2px; color: var(--ink);
  }
  button.go {
    font-family: "Spline Sans Mono", monospace; font-size: 13px; letter-spacing: .1em;
    text-transform: uppercase; cursor: pointer; padding: 0 26px;
    background: var(--accent); color: #fff; border: none; border-radius: 2px;
    transition: background .2s;
  }
  button.go:hover { background: var(--accent-deep); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .filters input { width: 120px; }
  .hint { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: #8a7f6f; letter-spacing: .04em; margin-bottom: 22px; }
  .hint code { background: #e9e1d2; padding: 1px 5px; border-radius: 3px; }

  /* Results */
  .meta-line { font-family: "Spline Sans Mono", monospace; font-size: 12px; color: #7c7264; letter-spacing: .08em; margin-bottom: 14px; }
  .sale {
    display: grid; grid-template-columns: 64px 1fr auto; gap: 16px; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--rule);
  }
  .sale .thumb {
    width: 64px; height: 64px; object-fit: cover; background: #e9e1d2;
    border: 1px solid var(--rule); border-radius: 2px;
  }
  .sale .thumb.ph { display:flex; align-items:center; justify-content:center; color:#bcae97; font-family:"Spline Sans Mono",monospace; font-size:9px; }
  .sale .title { font-size: 17px; line-height: 1.3; }
  a.titlelink { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--rule); transition: color .15s, border-color .15s; }
  a.titlelink:hover { color: var(--accent); border-color: var(--accent); }
  a.titlelink .ext { font-size: 12px; color: #a89b85; }
  a.titlelink:hover .ext { color: var(--accent); }
  .col-card a.titlelink { font-size: 18px; line-height: 1.25; }
  .sale .tags { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: #8a7f6f; letter-spacing: .05em; margin-top: 4px; }
  .sale .tags .badge { color: var(--accent-deep); }
  .sale .right { text-align: right; white-space: nowrap; }
  .sale .price { font-family: "Fraunces", serif; font-weight: 600; font-size: 24px; }
  .sale .date { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: #8a7f6f; }
  .sale .add {
    margin-top: 6px; font-family: "Spline Sans Mono", monospace; font-size: 10px; letter-spacing: .1em;
    text-transform: uppercase; cursor: pointer; background: none; color: var(--green);
    border: 1px solid var(--green); border-radius: 2px; padding: 4px 9px; transition: all .18s;
  }
  .sale .add:hover { background: var(--green); color: #fff; }
  .sale .add.done { color: #8a7f6f; border-color: var(--rule); cursor: default; }

  /* Collection */
  .summary-strip {
    display: flex; gap: 28px; flex-wrap: wrap; padding: 18px 22px; margin-bottom: 26px;
    background: var(--ink); color: var(--paper); border-radius: 3px;
  }
  .summary-strip .stat .n { font-family: "Fraunces", serif; font-weight: 900; font-size: 30px; line-height: 1; }
  .summary-strip .stat .l { font-family: "Spline Sans Mono", monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #b9ab94; margin-top: 6px; }

  .col-card {
    display: grid; grid-template-columns: 70px 1fr auto auto; gap: 18px; align-items: center;
    background: var(--card); border: 1px solid var(--rule); border-radius: 3px;
    padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .col-card .thumb { width: 70px; height: 70px; object-fit: cover; border:1px solid var(--rule); border-radius:2px; background:#e9e1d2; }
  .col-card .thumb.ph { display:flex; align-items:center; justify-content:center; color:#bcae97; font-family:"Spline Sans Mono",monospace; font-size:9px; }
  .col-card .title { font-size: 18px; line-height: 1.25; }
  .col-card .tags { font-family: "Spline Sans Mono", monospace; font-size: 11px; color: #8a7f6f; margin-top: 5px; letter-spacing:.04em; }
  .col-card .paid { font-family:"Spline Sans Mono",monospace; font-size:11px; color:#7c7264; margin-top:4px; }

  .values { display: flex; gap: 22px; text-align: right; }
  .values .v .amt { font-family: "Fraunces", serif; font-weight: 600; font-size: 21px; }
  .values .v .amt.none { color: #b3a691; font-weight:400; font-size:15px; }
  .values .v .lbl { font-family: "Spline Sans Mono", monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: #8a7f6f; margin-top:3px; }
  .values .v .delta { font-family:"Spline Sans Mono",monospace; font-size:10px; margin-top:2px; }
  .delta.up { color: var(--green); } .delta.down { color: var(--accent); }

  .col-actions { display:flex; flex-direction:column; gap:6px; }
  .col-actions button {
    font-family:"Spline Sans Mono",monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    cursor:pointer; border-radius:2px; padding:6px 10px; border:1px solid var(--rule); background:var(--paper); color:var(--ink);
    transition: all .18s; white-space:nowrap;
  }
  .col-actions button.refresh:hover { background:var(--gold); color:#fff; border-color:var(--gold); }
  .col-actions button.del:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .valued-at { font-family:"Spline Sans Mono",monospace; font-size:9px; color:#a89b85; margin-top:2px; text-align:center; }

  .empty { text-align:center; padding:70px 20px; color:#9a8e7c; }
  .empty .big { font-family:"Fraunces",serif; font-style:italic; font-size:26px; margin-bottom:8px; color:#6e6354; }
  .spinner { font-family:"Spline Sans Mono",monospace; font-size:12px; color:var(--accent-deep); letter-spacing:.1em; padding:30px 0; }
  .err { background:#f7e3df; border:1px solid var(--accent); color:var(--accent-deep); padding:12px 16px; border-radius:3px; font-family:"Spline Sans Mono",monospace; font-size:13px; margin:14px 0; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(28,26,23,.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--card); border:1.5px solid var(--ink); border-radius:4px; max-width:440px; width:100%; padding:28px; box-shadow:0 30px 60px -20px rgba(0,0,0,.5); }
  .modal h3 { font-family:"Fraunces",serif; font-weight:600; font-size:22px; margin-bottom:4px; }
  .modal .ctx { font-size:15px; color:#6e6354; margin-bottom:18px; line-height:1.35; }
  .modal label { display:block; font-family:"Spline Sans Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#8a7f6f; margin:12px 0 5px; }
  .modal input, .modal textarea { width:100%; font-family:"Newsreader",serif; font-size:16px; padding:9px 11px; border:1px solid var(--rule); border-radius:2px; background:var(--paper); color:var(--ink); }
  .modal textarea { resize:vertical; min-height:54px; }
  .modal .row2 { display:flex; gap:10px; }
  .modal .row2 > div { flex:1; }
  .modal .actions { display:flex; gap:10px; margin-top:22px; }
  .modal .actions button { flex:1; font-family:"Spline Sans Mono",monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; padding:11px; border-radius:2px; }
  .modal .save { background:var(--green); color:#fff; border:none; }
  .modal .cancel { background:none; border:1px solid var(--rule); color:var(--ink); }

  /* Backup bar */
  .backup-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:12px 16px; margin-bottom:22px; background:var(--card); border:1px solid var(--rule); border-radius:3px; }
  .backup-bar .bk-label { font-family:"Spline Sans Mono",monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#8a7f6f; margin-right:2px; }
  .backup-bar .bk-btn { font-family:"Spline Sans Mono",monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; text-decoration:none; padding:7px 13px; border:1px solid var(--ink); border-radius:2px; background:var(--paper); color:var(--ink); transition:all .18s; }
  .backup-bar .bk-btn:hover { background:var(--ink); color:var(--paper); }
  .backup-bar .bk-status { font-family:"Spline Sans Mono",monospace; font-size:11px; color:var(--green); margin-left:auto; }

  /* Login gate */
  #login-gate { position:fixed; inset:0; background:var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(28,26,23,.04) 1px, transparent 0);
    background-size:22px 22px; display:flex; align-items:center; justify-content:center; padding:24px; z-index:100; }
  .login-box { width:100%; max-width:380px; }
  .login-box .brand { font-family:"Fraunces",serif; font-weight:900; font-size:46px; letter-spacing:-.02em; line-height:.95; border-bottom:3px double var(--ink); padding-bottom:14px; margin-bottom:4px; }
  .login-box .brand .sub { display:block; font-family:"Spline Sans Mono",monospace; font-weight:400; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--accent-deep); margin-top:9px; }
  .login-box label { display:block; font-family:"Spline Sans Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#8a7f6f; margin:18px 0 5px; }
  .login-box input { width:100%; font-family:"Newsreader",serif; font-size:17px; padding:11px 13px; border:1.5px solid var(--ink); border-radius:2px; background:var(--card); color:var(--ink); }
  .login-box input:focus { outline:2px solid var(--accent); outline-offset:1px; }
  .login-box button { width:100%; margin-top:22px; font-family:"Spline Sans Mono",monospace; font-size:13px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:2px; transition:background .2s; }
  .login-box button:hover { background:var(--accent-deep); }
  .login-box .lerr { font-family:"Spline Sans Mono",monospace; font-size:12px; color:var(--accent-deep); margin-top:14px; min-height:16px; }
  #app-root { display:none; }
  .whoami { font-family:"Spline Sans Mono",monospace; font-size:11px; letter-spacing:.08em; color:#7c7264; text-align:right; }
  .whoami button { appearance:none; background:none; border:none; cursor:pointer; color:var(--accent-deep); font-family:inherit; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:0; margin-top:4px; text-decoration:underline; }
</style>
</head>
<body>
<!-- LOGIN GATE -->
<div id="login-gate">
  <div class="login-box">
    <div class="brand">The Stash<span class="sub">Sold-Price Ledger &amp; Collection</span></div>
    <label>Username</label>
    <input type="text" id="login-user" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()" />
    <label>Password</label>
    <input type="password" id="login-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Sign in</button>
    <div class="lerr" id="login-err"></div>
  </div>
</div>

<div id="app-root">
<div class="wrap">
  <header class="masthead">
    <h1>The Stash<span class="sub">Sold-Price Ledger &amp; Collection</span></h1>
    <div class="whoami" id="whoami"></div>
  </header>

  <nav class="tabs">
    <button id="tab-search" class="active" onclick="showTab('search')">Search Sales</button>
    <button id="tab-collection" onclick="showTab('collection')">My Collection</button>
  </nav>

  <!-- SEARCH -->
  <section id="panel-search" class="panel active">
    <div class="searchbar">
      <input type="text" id="q" placeholder="e.g. 2018 Bowman Chrome Ohtani PSA 10" onkeydown="if(event.key==='Enter')runSearch()" />
      <button class="go" onclick="runSearch()">Search</button>
    </div>
    <div class="filters">
      <select id="platform">
        <option value="">All platforms</option>
        <option>ebay</option><option>goldin</option><option>heritage</option>
        <option>fanatics-vault</option><option>rea</option><option>alt</option><option>pristine</option>
      </select>
      <select id="listing_type">
        <option value="">Any sale type</option>
        <option value="auction">Auction</option>
        <option value="fixed_price">Fixed price</option>
        <option value="best_offer">Best offer</option>
      </select>
      <select id="sort">
        <option value="date_desc">Newest first</option>
        <option value="date_asc">Oldest first</option>
        <option value="price_desc">Price high→low</option>
        <option value="price_asc">Price low→high</option>
      </select>
      <input type="number" id="price_min" placeholder="Min $" />
      <input type="number" id="price_max" placeholder="Max $" />
    </div>
    <div class="hint">
      Boolean syntax: <code>(psa,bgs)</code> = OR · <code>-reprint</code> = exclude · <code>"topps chrome"</code> = exact phrase
    </div>
    <div id="search-results"></div>
  </section>

  <!-- COLLECTION -->
  <section id="panel-collection" class="panel">
    <div id="summary"></div>
    <div class="backup-bar">
      <span class="bk-label">Backup</span>
      <a class="bk-btn" href="/api/collection/export.json" download>Export JSON</a>
      <a class="bk-btn" href="/api/collection/export.csv" download>Export CSV</a>
      <button class="bk-btn" onclick="document.getElementById('import-file').click()">Import JSON…</button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="handleImport(this)" />
      <span class="bk-status" id="import-status"></span>
    </div>
    <div id="collection-list"></div>
  </section>
</div>

<!-- Add-to-collection modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Add to collection</h3>
    <div class="ctx" id="modal-ctx"></div>
    <label>Search query for valuations</label>
    <input type="text" id="m-query" />
    <div class="row2">
      <div><label>Grader</label><input type="text" id="m-grader" placeholder="PSA" /></div>
      <div><label>Grade</label><input type="text" id="m-grade" placeholder="10" /></div>
    </div>
    <label>What you paid (optional)</label>
    <input type="number" id="m-paid" placeholder="0.00" />
    <label>Notes (optional)</label>
    <textarea id="m-notes"></textarea>
    <div class="actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveCard()">Add card</button>
    </div>
  </div>
</div>
</div><!-- /#app-root -->

<script>
const $ = (id) => document.getElementById(id);
const money = (n) => n == null ? "—" : "$" + Number(n).toLocaleString(undefined,{maximumFractionDigits:0});

let pendingCard = null;
let lastResults = [];
let currentUser = null;

// ---------- Auth ----------
async function checkSession(){
  try {
    const res = await fetch("/api/me");
    const data = await res.json();
    if(data.user){ enterApp(data.user); }
    else { showLogin(); }
  } catch { showLogin(); }
}
function showLogin(){
  currentUser = null;
  $("login-gate").style.display = "flex";
  $("app-root").style.display = "none";
  $("login-pass").value = "";
  setTimeout(()=>$("login-user").focus(), 50);
}
function enterApp(username){
  currentUser = username;
  $("login-gate").style.display = "none";
  $("app-root").style.display = "block";
  $("whoami").innerHTML = "Signed in as <strong>"+esc(username)+"</strong><br><button onclick=\"doLogout()\">Sign out</button>";
}
async function doLogin(){
  const username = $("login-user").value.trim();
  const password = $("login-pass").value;
  const errEl = $("login-err");
  errEl.textContent = "";
  if(!username || !password){ errEl.textContent = "Enter username and password."; return; }
  try {
    const res = await fetch("/api/login", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || "Login failed."; return; }
    enterApp(data.username);
  } catch(e){ errEl.textContent = "Network error."; }
}
async function doLogout(){
  await fetch("/api/logout", {method:"POST"});
  showLogin();
}
// Wrap fetch for API calls: if a 401 comes back, bounce to login.
async function apiFetch(url, opts){
  const res = await fetch(url, opts);
  if(res.status === 401){ showLogin(); throw new Error("Session expired — please sign in again."); }
  return res;
}

function showTab(name){
  ["search","collection"].forEach(t=>{
    $("panel-"+t).classList.toggle("active", t===name);
    $("tab-"+t).classList.toggle("active", t===name);
  });
  if(name==="collection") loadCollection();
}

// ---------- Search ----------
async function runSearch(){
  const q = $("q").value.trim();
  const box = $("search-results");
  if(q.length < 4){ box.innerHTML = '<div class="err">Enter at least 4 characters.</div>'; return; }
  box.innerHTML = '<div class="spinner">Pulling sold listings…</div>';
  const p = new URLSearchParams({ q,
    platform: $("platform").value, listing_type: $("listing_type").value,
    sort: $("sort").value, price_min: $("price_min").value, price_max: $("price_max").value,
    limit: 25 });
  try {
    const res = await apiFetch("/api/search?"+p.toString());
    const data = await res.json();
    if(!res.ok){ box.innerHTML = '<div class="err">'+ (data.error||"Search failed") +'</div>'; return; }
    renderSales(data);
  } catch(e){ box.innerHTML = '<div class="err">Network error: '+e.message+'</div>'; }
}

function renderSales(data){
  const box = $("search-results");
  const rows = data.data || [];
  lastResults = rows;
  if(!rows.length){ box.innerHTML = '<div class="empty"><div class="big">No sales found.</div>Try broader terms or a different platform.</div>'; return; }
  const m = data.meta || {}; const pg = data.pagination || {};
  // ---- TEMP DIAGNOSTIC: list field names + sample values from first result ----
  let diag = '<div style="background:#fff8e1;border:1px solid #d8c87a;border-radius:3px;padding:12px 14px;margin-bottom:16px;font-family:monospace;font-size:12px;line-height:1.6;word-break:break-all;">';
  diag += '<strong>DIAGNOSTIC — fields in first result (find the one with the listing URL):</strong><br>';
  const first = rows[0] || {};
  for(const k of Object.keys(first)){
    let v = first[k];
    if(typeof v === "string" && v.length > 90) v = v.slice(0,90) + "…";
    if(v && typeof v === "object") v = JSON.stringify(v).slice(0,90);
    diag += '<span style="color:#7d2114;">'+esc(k)+'</span> = '+esc(String(v))+'<br>';
  }
  diag += '</div>';
  // ---- END DIAGNOSTIC ----
  let html = diag + '<div class="meta-line">'+ (pg.total||rows.length).toLocaleString() +' total matches · showing '+rows.length;
  if(m.coverage_date_from) html += ' · coverage '+m.coverage_date_from+' → '+m.coverage_date_to;
  html += '</div>';
  rows.forEach((s,i)=>{
    const thumb = s.thumbnail_url || s.image_url;
    const grade = [s.grader, s.grade].filter(Boolean).join(" ");
    const link = saleUrl(s);
    const titleHtml = link
      ? '<a class="title titlelink" href="'+esc(link)+'" target="_blank" rel="noopener noreferrer">'+ esc(s.title) +' <span class="ext">↗</span></a>'
      : '<div class="title">'+ esc(s.title) +'</div>';
    html += '<div class="sale">'
      + (thumb ? '<a href="'+(link?esc(link):'#')+'" target="_blank" rel="noopener noreferrer"><img class="thumb" src="'+thumb+'" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'thumb ph\',textContent:\'no img\'}))" /></a>' : '<div class="thumb ph">no img</div>')
      + '<div>'+ titleHtml +'<div class="tags">'
        + '<span class="badge">'+ esc(s.platform||'') +'</span> · '+ esc(s.listing_type||'')
        + (grade ? ' · '+esc(grade) : '')
        + (s.seller ? ' · '+esc(s.seller) : '') +'</div></div>'
      + '<div class="right"><div class="price">'+ money(s.price) +'</div><div class="date">'+ esc(s.sale_date||'') +'</div>'
        + '<button class="add" id="add-'+i+'" data-idx="'+i+'" onclick="openModal(this)">+ Collection</button>'
      + '</div></div>';
  });
  box.innerHTML = html;
}
// The API may name the listing URL differently across platforms; check the
// common candidates and return the first valid http(s) URL found.
function saleUrl(s){
  const candidates = [s.url, s.listing_url, s.item_url, s.item_web_url, s.itemWebUrl,
    s.web_url, s.link, s.permalink, s.source_url, s.ebay_url, s.listingUrl];
  for(const c of candidates){
    if(typeof c === "string" && /^https?:\/\//i.test(c)) return c;
  }
  return null;
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

// ---------- Modal ----------
function openModal(btn){
  const idx = Number(btn.dataset.idx);
  const s = lastResults[idx];
  if(!s) return;
  pendingCard = { idx, sale: s };
  $("modal-ctx").textContent = s.title;
  let q = s.title || "";
  $("m-query").value = q.length > 70 ? q.slice(0,70) : q;
  $("m-grader").value = s.grader || "";
  $("m-grade").value = s.grade || "";
  $("m-paid").value = "";
  $("m-notes").value = "";
  $("modal-bg").classList.add("open");
}
function closeModal(){ $("modal-bg").classList.remove("open"); pendingCard=null; }

async function saveCard(){
  if(!pendingCard) return;
  const s = pendingCard.sale;
  const body = {
    title: s.title,
    query: $("m-query").value.trim() || s.title,
    grader: $("m-grader").value.trim(),
    grade: $("m-grade").value.trim(),
    paid: $("m-paid").value,
    notes: $("m-notes").value.trim(),
    image_url: s.thumbnail_url || s.image_url || null,
    listing_url: saleUrl(s)
  };
  const res = await apiFetch("/api/collection", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(res.ok){
    const btn = $("add-"+pendingCard.idx);
    if(btn){ btn.textContent="✓ Added"; btn.classList.add("done"); btn.disabled=true; btn.setAttribute("onclick",""); }
    closeModal();
  } else {
    const d = await res.json(); alert(d.error||"Could not add card");
  }
}

// ---------- Collection ----------
async function loadCollection(){
  const list = $("collection-list");
  list.innerHTML = '<div class="spinner">Loading collection…</div>';
  const res = await apiFetch("/api/collection");
  const cards = await res.json();
  renderSummary(cards);
  if(!cards.length){
    list.innerHTML = '<div class="empty"><div class="big">Your stash is empty.</div>Search sold listings and tap “+ Collection” to start tracking.</div>';
    return;
  }
  list.innerHTML = cards.map(renderColCard).join("");
}

function renderSummary(cards){
  const valued = cards.filter(c=>c.avg_price!=null);
  const totalAvg = valued.reduce((s,c)=>s+(c.avg_price||0),0);
  const totalPaid = cards.reduce((s,c)=>s+(c.paid||0),0);
  const gain = totalAvg - totalPaid;
  $("summary").innerHTML = cards.length ? '<div class="summary-strip">'
    + '<div class="stat"><div class="n">'+cards.length+'</div><div class="l">Cards</div></div>'
    + '<div class="stat"><div class="n">'+money(totalAvg)+'</div><div class="l">Est. value (avg comps)</div></div>'
    + '<div class="stat"><div class="n">'+money(totalPaid)+'</div><div class="l">Total paid</div></div>'
    + (totalPaid>0 ? '<div class="stat"><div class="n" style="color:'+(gain>=0?'#7fd3a8':'#e8a99a')+'">'+(gain>=0?'+':'')+money(gain)+'</div><div class="l">Unrealized</div></div>' : '')
    + '</div>' : '';
}

function renderColCard(c){
  const grade = [c.grader,c.grade].filter(Boolean).join(" ");
  const thumb = c.image_url
    ? '<img class="thumb" src="'+c.image_url+'" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'thumb ph\',textContent:\'no img\'}))" />'
    : '<div class="thumb ph">no img</div>';
  let deltaLatest="", deltaAvg="";
  if(c.paid){
    if(c.latest_price!=null){ const d=c.latest_price-c.paid; deltaLatest='<div class="delta '+(d>=0?'up':'down')+'">'+(d>=0?'+':'')+money(d)+'</div>'; }
    if(c.avg_price!=null){ const d=c.avg_price-c.paid; deltaAvg='<div class="delta '+(d>=0?'up':'down')+'">'+(d>=0?'+':'')+money(d)+'</div>'; }
  }
  const valuedAt = c.valued_at ? '<div class="valued-at">upd '+ new Date(c.valued_at).toLocaleDateString() +'</div>' : '';
  const titleHtml = (typeof c.listing_url === "string" && /^https?:\/\//i.test(c.listing_url))
    ? '<a class="title titlelink" href="'+esc(c.listing_url)+'" target="_blank" rel="noopener noreferrer">'+esc(c.title)+' <span class="ext">↗</span></a>'
    : '<div class="title">'+esc(c.title)+'</div>';
  return '<div class="col-card">'
    + thumb
    + '<div>'+ titleHtml
      + '<div class="tags">'+ (grade?esc(grade)+' · ':'') + (c.comp_count?c.comp_count+' comps':'not yet valued') +'</div>'
      + (c.paid?'<div class="paid">paid '+money(c.paid)+'</div>':'')
      + (c.notes?'<div class="paid">“'+esc(c.notes)+'”</div>':'')
      +'</div>'
    + '<div class="values">'
      + '<div class="v"><div class="amt'+(c.latest_price==null?' none':'')+'">'+ (c.latest_price==null?'—':money(c.latest_price)) +'</div><div class="lbl">Latest sale</div>'+deltaLatest+'</div>'
      + '<div class="v"><div class="amt'+(c.avg_price==null?' none':'')+'">'+ (c.avg_price==null?'—':money(c.avg_price)) +'</div><div class="lbl">Avg (recent)</div>'+deltaAvg+'</div>'
      +'</div>'
    + '<div class="col-actions"><button class="refresh" onclick="refreshValue('+c.id+',this)">Refresh value</button>'
      + '<button class="del" onclick="delCard('+c.id+')">Remove</button>'+valuedAt+'</div>'
  + '</div>';
}

async function refreshValue(id, btn){
  const old = btn.textContent; btn.textContent="…"; btn.disabled=true;
  try{
    const res = await apiFetch("/api/collection/"+id+"/value",{method:"POST"});
    const data = await res.json();
    if(!res.ok){ alert(data.error||"Could not refresh"); btn.textContent=old; btn.disabled=false; return; }
    loadCollection();
  }catch(e){ alert("Network error"); btn.textContent=old; btn.disabled=false; }
}
async function delCard(id){
  if(!confirm("Remove this card from your collection?")) return;
  await apiFetch("/api/collection/"+id,{method:"DELETE"});
  loadCollection();
}

async function handleImport(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const status = $("import-status");
  status.style.color = "var(--green)";
  status.textContent = "Reading file…";
  let data;
  try {
    data = JSON.parse(await file.text());
  } catch(e){
    status.style.color = "var(--accent)";
    status.textContent = "That doesn't look like a valid JSON backup.";
    input.value = "";
    return;
  }
  if(!data || !Array.isArray(data.cards)){
    status.style.color = "var(--accent)";
    status.textContent = "No cards found in that file.";
    input.value = "";
    return;
  }
  const count = data.cards.length;
  const replace = confirm(
    "Import "+count+" card(s).\n\n" +
    "OK = REPLACE your current collection with this backup.\n" +
    "Cancel = MERGE (add these on top of what you have)."
  );
  status.textContent = "Importing…";
  try {
    const res = await apiFetch("/api/collection/import", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ cards: data.cards, mode: replace ? "replace" : "merge" })
    });
    const out = await res.json();
    if(!res.ok){ throw new Error(out.error || "Import failed"); }
    status.style.color = "var(--green)";
    status.textContent = "Imported "+out.imported+(out.skipped?(", skipped "+out.skipped):"")+" ("+out.mode+").";
    loadCollection();
  } catch(e){
    status.style.color = "var(--accent)";
    status.textContent = e.message;
  }
  input.value = "";
}

checkSession();
</script>
